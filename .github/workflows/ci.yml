name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  list-examples:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v6

      - id: set-matrix
        run: echo "matrix=$(find ./examples -maxdepth 2 -name 'Dockerfile' -exec dirname {} \; | xargs -I{} basename {} | sort | jq -R -s -c 'split("\n")[:-1]')" >> $GITHUB_OUTPUT

  lint-dockerfiles:
    needs: list-examples
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJson(needs.list-examples.outputs.matrix) }}

    steps:
      - name: Lint Dockerfile
        uses: cerberauth/ci/actions/docker-lint@main
        with:
          dockerfile: examples/${{ matrix.example }}/Dockerfile

  example-docker:
    needs: [list-examples, lint-dockerfiles]
    runs-on: ubuntu-latest

    permissions:
      packages: write

    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJson(needs.list-examples.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./examples/${{ matrix.example }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/cerberauth/openid-connect-examples/${{ matrix.example }}:latest
          cache-from: type=registry,ref=ghcr.io/cerberauth/openid-connect-examples/${{ matrix.example }}:latest
          cache-to: type=inline
